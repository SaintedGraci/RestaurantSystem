version: '3.8'

services:
  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./restaurant2:/var/www/html
    depends_on:
      - php
      - mysql

  php:
    build:
      context: ./docker/php
    expose:
      - "9000"
    ports:
      - "8081:9000"
    volumes:
      - ./restaurant2:/var/www/html
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: restaurant_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
    build:
      context: ./docker/mysql
    container_name: rc-db
    platform: linux/x86_64
    ports:
      - "3307:3306"   # Maps container's 3306 to host's 3307
    environment:
      - LANG=C.UTF-8
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=root
      - MYSQL_PASSWORD=root
    volumes:
      - mysql-volume:/var/lib/mysql

volumes:
  mysql-volume:

networks:
  default:
    driver: bridge
